services:
  - type: web
    name: rag-document-api
    env: docker
    plan: free
    region: ohio
    dockerCommand: ./start.sh
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
